baseURL = "https://geson-anko.github.io/"
languageCode = "ja"
defaultContentLanguage = "ja"
theme = "blowfish"
enableEmoji = true
enableRobotsTXT = true

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
